<!DOCTYPE html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juz Amma Audio - Kumpulan Doa</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/tasbih.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
<style>/* RESET DASAR */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

/* VARIABEL TEMA */
:root {
    --bg-color: #f0f4f8;
    --text-color: #2d3748;
    --header-bg: #319795;
    --header-text: white;
    --menu-bg: white;
    --menu-text: #2d3748;
    --menu-hover-border: #319795;
    --menu-shadow: rgba(0,0,0,0.05);
    --menu-hover-shadow: rgba(0,0,0,0.1);
    --icon-bg: #e6fffa;
    --icon-color: #319795;
    --footer-text: #a0aec0;
    --toggle-bg: #e2e8f0;
    --toggle-circle: white;
    --page-bg: #f0f4f8;
    --surface-main: #ffffff;
    --surface-title: #e6fffa;
    --surface-controls: #edf2f7;
    --surface-card: #ffffff;
    --surface-card-border: rgba(49,151,149,0.12);
    --surface-card-shadow: rgba(0,0,0,0.06);
    --text-main: #2d3748;
    --text-subtle: #718096;
}

[data-theme="dark"] {
    --bg-color: #1a202c;
    --text-color: #e2e8f0;
    --header-bg: #2c7a7b;
    --header-text: white;
    --menu-bg: #2d3748;
    --menu-text: #e2e8f0;
    --menu-hover-border: #4fd1c5;
    --menu-shadow: rgba(0,0,0,0.3);
    --menu-hover-shadow: rgba(0,0,0,0.5);
    --icon-bg: #2c7a7b;
    --icon-color: #4fd1c5;
    --footer-text: #718096;
    --toggle-bg: #4fd1c5;
    --toggle-circle: #1a202c;
    --page-bg: #1a202c;
    --surface-main: #2d3748;
    --surface-title: rgba(79,209,197,0.10);
    --surface-controls: #1f2937;
    --surface-card: #2d3748;
    --surface-card-border: rgba(255,255,255,0.08);
    --surface-card-shadow: rgba(0,0,0,0.24);
    --text-main: #e2e8f0;
    --text-subtle: #a0aec0;
}
  
/* AKSI GLOBAL */
.global-actions {
    display: flex;
    gap: 10px;
    max-width: 100%;
    width: 400px;
    margin-top: 60px;
    padding: 0 15px;
}

.global-btn {
    flex: 1;
    border: none;
    padding: 20px;
    border-radius: 12px;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: .3s;
}

.global-btn:hover {
    transform: scale(1.02);
}

.play-all-btn {
    background: #319795;
}

.download-all-btn {
    background: #2c7a7b;
}

/* PLAYLIST */
.playlist-container {
    max-width: 500px;
    margin-top: 10px;
    padding: 0 15px;
}

.track-item {
    background: var(--card-bg);
    padding: 12px 15px;
    margin-bottom: 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* PLAYER VIEW */
#playerView {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg) 100%);
    z-index: 1000;
    overflow-y: auto;
    padding: 20px;
    box-sizing: border-box;
}

.close-btn {
    display: none !important;
    font-size: 24px;
    cursor: pointer;
    color: var(--header-bg);
}

.player-content {
    text-align: center;
    margin-top: 10px;
}

.ayat-list {
    margin-top: 10px;
    text-align: left;
}

.download-btn {
    color: var(--header-bg);
    padding: 10px;
    font-size: 1.2rem;
    text-decoration: none;
}

/* JUDUL SURAH */
.surah-title-wrap {
    display: flex;
    justify-content: center;
    margin-top: 35px;
    margin-bottom: 10px;
}

#activeSurahName {
    background: var(--surface-title);
    color: var(--text-main);
    padding: 12px 16px;
    border-radius: 16px;
    width: fit-content;
    box-shadow: 0 4px 12px var(--surface-card-shadow);
    border: 1px solid var(--surface-card-border);
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
}

/* PANEL AYAT */
.ayat-panel {
    background: var(--surface-main);
    border: 1px solid var(--surface-card-border);
    border-radius: 24px;
    box-shadow: 0 10px 30px var(--surface-card-shadow);
    padding: 20px 18px;
    margin: 0 auto;
}

#arabicText {
    position: relative;
    min-height: 250px;
    overflow: hidden;
}

/* PANEL AYAT */
.ayat-wrapper{
    position:relative;
    min-height:320px;      /* lebih panjang ke bawah */
}

.arabic-panel .ayat-wrapper{
    background:rgba(49,151,149,.06);
    border:1px solid rgba(49,151,149,.12);
    border-radius:18px;
    padding:20px 18px;
}

[data-theme="dark"] .arabic-panel .ayat-wrapper{
    background:rgba(49,151,149,.10);
    border:1px solid rgba(49,151,149,.18);
}

/* SUSUNAN 3 AYAT */
.ayat-stack{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:8px;          /* jarak antar ayat */
}

/* AYAT SEBELUMNYA */
.ayat-above{
    font-size:1.15rem;
    line-height:1.5;
    opacity:.28;
    filter:blur(.3px);
    text-align:center;
    direction:rtl;
    transition:.4s;
}

/* AYAT AKTIF */
.arabic-panel .ayat-current{
    font-size:1.8rem;
    line-height:2;
    text-align:center;
    direction:rtl;
    padding:4px 0;
    transition:.4s;
}

/* AYAT BERIKUTNYA */
.arabic-panel .ayat-next{
    font-size:1.15rem;
    line-height:1.5;
    opacity:.28;
    filter:blur(.3px);
    text-align:center;
    direction:rtl;
    transition:.4s;
}
/* TERJEMAH */
.translate-panel {
    margin-top: -20px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.025);
    border-radius: 12px;
    border-top: 1px solid rgba(0, 0, 0, 0.08);
    text-align: center;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text-subtle);
    opacity: 1;
    transition: opacity 0.3s ease;
    font: Poppins;
}

[data-theme="dark"] .translate-panel {
    background: rgba(255, 255, 255, 0.04);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

/* TOGGLE TERJEMAH */
.translation-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: -10px;
    margin-bottom: -5px;
    padding-left: 4px;
    font-size: 0.82rem;
    color: rgba(0,0,0,.45);
    cursor: pointer;
    user-select: none;
    transition: all .3s ease;
}

.translation-toggle:hover {
    color: rgba(0,0,0,.65);
}

.translation-toggle i {
    font-size: 0.7rem;
    transition: transform .3s ease;
}

[data-theme="dark"] .translation-toggle {
    color: rgba(255,255,255,.45);
}

[data-theme="dark"] .translation-toggle:hover {
    color: rgba(255,255,255,.7);
}

/* AUDIO PROGRESS */
.audio-progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    margin-bottom: -5px;
}

.audio-progress-wrap span {
    font-size: .75rem;
    min-width: 42px;
    color: var(--text-subtle);
}

#audioProgress {
    flex: 1;
    height: 5px;
    appearance: none;
    border-radius: 999px;
    outline: none;
    cursor: pointer;
    background: #d1d5db;
}

#audioProgress::-webkit-slider-thumb {
    appearance: none;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #319795;
}

#audioProgress::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border: none;
    border-radius: 50%;
    background: #319795;
}

/* PANEL KONTROL */
.control-panel {
    margin-top: 10px;
    background: var(--surface-controls);
    border: 1px solid var(--surface-card-border);
    border-radius: 18px;
    box-shadow: 0 6px 18px var(--surface-card-shadow);
    padding: 12px 14px;
}

.control-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 0;
    padding: 0;
}

.control-btn {

    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--header-bg);
    color: white;
    font-size: 18px;
}

.control-btn:disabled {
    background: #a0aec0;
    cursor: not-allowed;
    transform: none;
}

.play-pause-btn {
    width: 45px;
    height: 45px;
    font-size: 15px;
    background: #319795;
}

.prev-btn,
.next-btn {
    width: 35px;
    height: 35px;
    font-size: 15px;
}

/* SURAH SELANJUTNYA */
.next-surah-section {
    margin-top: 10px;
    padding: 14px 12px 8px;
    background: var(--surface-card);
    border: 1px solid var(--surface-card-border);
    border-radius: 18px;
    box-shadow: 0 8px 22px var(--surface-card-shadow);
}

.next-surah-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
}

.next-surah-title {
    font-size: 8rem;
    font-weight: 700;
    margin: 0;
    color: var(--text-main);
    margin-top: -5px;
    margin-bottom: 5px;
}

.next-surah-subtitle {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-top: -5px;
    color: var(--text-subtle);
}

.next-surah-hint {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--header-bg);
    color: #fff;
    flex-shrink: 0;
}

.next-surah-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
}

.next-surah-scroll::-webkit-scrollbar {
    display: none;
}

.surah-chip {
    border: none;
    border-radius: 16px;
    padding: 12px 14px;
    background: linear-gradient(135deg, #319795, #2c7a7b);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(49,151,149,0.18);
    transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    text-align: left;
}

[data-theme="dark"] .surah-chip {
    box-shadow: 0 8px 18px rgba(0,0,0,0.22);
}

.chip-id {
    font-size: 0.8rem;
    background: rgba(255,255,255,0.18);
    padding: 4px 8px;
    border-radius: 999px;
    flex-shrink: 0;
}

.chip-name {
    flex: 1;
    font-size: 0.8rem;
    font-weight: 600;
    line-height: 1.2;
}

.chip-icon {
    font-size: 0.8rem;
    opacity: 0.9;
    flex-shrink: 0;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    body {
        padding: 0;
        background-color: #ffffff;
    }

    .arabic {
        font-size: 1.6rem;
        line-height: 2;
    }

    h1 {
        font-size: 1.5rem;
    }

    .subtitle {
        font-size: 0.9rem;
    }

    .surah-chip {
        min-width: 155px;
    }

    .next-surah-section {
        border-radius: 16px;
        padding: 12px 10px 2px;
    }

    .next-surah-title {
        font-size: 0.95rem;
    }

    .ayat-panel {
        padding: 16px 14px;
        border-radius: 20px;
    }

    .arabic-panel .ayat-wrapper {
        padding: 12px;
        border-radius: 14px;
    }
}
  /* List Surah - Mode Gelap */
[data-theme="dark"] .track-item{
    background: #2d3748;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 12px rgba(0,0,0,.25);
}

  .drawer-btn,
.theme-toggle,
.control-btn{
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    border:none;
    border-radius:50%;
    flex-shrink:0;
}

.drawer-close-icon{margin-left:1px;}
.drawer-btn i,
.theme-toggle i,
.control-btn i{
    font-size:16px;
    line-height:1;
}
#activeSurahName{
    background: var(--surface-title);
    color: var(--text-main);
    padding:16px;
    border-radius:16px;
    width:100%;
    max-width:420px;
    margin:auto;
    text-align:center;
    border:1px solid var(--surface-card-border);
    box-shadow:0 4px 12px var(--surface-card-shadow);
}

.page-title-inside{
    font-size:.78rem;
    opacity:.65;
    letter-spacing:.5px;
    margin-bottom:6px;
    text-transform:uppercase;
}

.surah-name-inside{
    font-size:1.15rem;
    font-weight:700;
}

  .back-container {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.back-button {
    width: 16px;
    height: 16px;
    border-left: 4px solid #fff;
    border-bottom: 4px solid #fff;
    transform: rotate(45deg);
    border-radius: 2px;
}

</style>
</head>
<body>
<div class="top-header">

    <!-- Tombol Back -->

<script>
// ===== VARIABEL GLOBAL =====
let currentTimestampData = null;
let currentSurahData = null;
let currentSurahId = null;
let currentAyat = 1;
let totalAyatGlobal = 0;
let currentSurahIndex = 0;
let playlist;
let playerView;
let audio;
let currentSurahDataSync = null;
let showTranslation = true;
let currentTahap = 0;
let isPlayAllMode = false;
// ===== MENU SURAH =====
const menuSurah = [
    { id: 78, name: "An-Naba'" }, { id: 79, name: "An-Nazi'at" }, { id: 80, name: "'Abasa" },
    { id: 81, name: "At-Takwir" }, { id: 82, name: "Al-Infithar" }, { id: 83, name: "Al-Muthaffifiin" },
    { id: 84, name: "Al-Insyiqaq" }, { id: 85, name: "Al-Buruj" }, { id: 86, name: "At-Tariq" },
    { id: 87, name: "Al-A'la" }, { id: 88, name: "Al-Ghasyiyah" }, { id: 89, name: "Al-Fajr" },
    { id: 90, name: "Al-Balad" }, { id: 91, name: "Asy-Syams" }, { id: 92, name: "Al-Lail" },
    { id: 93, name: "Ad-Dhuha" }, { id: 94, name: "Al-Insyirah" }, { id: 95, name: "At-Tin" },
    { id: 96, name: "Al-Alaq" }, { id: 97, name: "Al-Qadr" }, { id: 98, name: "Al-Bayyinah" },
    { id: 99, name: "Al-Zalzalah" }, { id: 100, name: "Al-'Adiyat" }, { id: 101, name: "Al-Qaari'ah" },
    { id: 102, name: "At-Takaatsur" }, { id: 103, name: "Al-'Ashr" }, { id: 104, name: "Al-Humazah" },
    { id: 105, name: "Al-Fil" }, { id: 106, name: "Quraisy" }, { id: 107, name: "Al-Maa'uun" },
    { id: 108, name: "Al-Kautsar" }, { id: 109, name: "Al-Kafirun" }, { id: 110, name: "An-Nashr" },
    { id: 111, name: "Al-Lahab" }, { id: 112, name: "Al-Ikhlash" }, { id: 113, name: "Al-Falaq" },
    { id: 114, name: "An-Nas" }
];

function renderMenu() {
    menuSurah.forEach(s => {
        const div = document.createElement('div');
        div.className = 'track-item';
        div.innerHTML = `
            <div class="track-icon" style="width: 40px; height: 40px; background: var(--header-bg); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-play"></i>
            </div>
            <div class="track-info" onclick="startSurah(${s.id})" style="flex-grow:1;">
                <div style="font-weight:600;">${s.name}</div>
                <p style="font-size:0.75rem; opacity:0.7;">Surah ke-${s.id}</p>
            </div>
            <a href="audio/${s.id}-1.m4a" download class="download-btn"><i class="fa-solid fa-download"></i></a>
        `;
        playlist.appendChild(div);
    });
}

async function startSurah(id) {
  
    try {
        const res = await fetch(`juzAmma/${id}.json`);
        const json = await res.json();
        const data = json[String(id)];
        const timestampFile = `timestamp/${id}.json`;

        try {
            const tsRes = await fetch(timestampFile);

            if (!tsRes.ok) {
                throw new Error(`Timestamp tidak ditemukan: ${timestampFile}`);
            }

            const tsData = await tsRes.json();

            currentTimestampData = {
                surahId: id,
                timestamps: Array.isArray(tsData)
                    ? tsData
                    : tsData.timestamps || []
            };

        } catch (err) {
            console.warn("Gagal memuat timestamp:", err);

            currentTimestampData = {
                surahId: id,
                timestamps: []
            };
        }
        currentSurahData = data;
        currentSurahId = id;
        currentSurahIndex =
    menuSurah.findIndex(s => s.id === id);
        currentAyat = 1;  // ⟳ PERBAIKAN: ayat mulai dari 1
        currentTahap = -1; // ⟳ PERBAIKAN: reset ke -1 (belum ada segment)
        totalAyatGlobal = parseInt(data.number_of_ayah);

        playerView.style.display = 'block';
        playlist.style.display = 'none';

        const container = document.getElementById('ayatListContainer');
        const currentIndex = menuSurah.findIndex(s => s.id === id);
        let nextSurahHtml = "";

        for (let i = currentIndex + 1; i < Math.min(currentIndex + 6, menuSurah.length); i++) {
            const next = menuSurah[i];
            nextSurahHtml += `
                <button onclick="startSurah(${next.id})" class="surah-chip">
                    <span class="chip-id">#${next.id}</span>
                    <span class="chip-name">${next.name}</span>
                    <i class="fa-solid fa-play chip-icon"></i>
                </button>
            `;
        }

        updatePrevNextButtons();

        container.innerHTML = `
            <div class="next-surah-section">
                <div class="next-surah-header">
                    <div>
                        <h4 class="next-surah-title">Surah Selanjutnya</h4>
                        <p class="next-surah-subtitle">Geser untuk melihat pilihan berikutnya</p>
                    </div>
                    <div class="next-surah-hint">
                        <i class="fa-solid fa-angles-right"></i>
                    </div>
                </div>
                <div class="next-surah-scroll">
                    ${nextSurahHtml}
                </div>
            </div>
        `;

        // ⟳ PERBAIKAN: pass ayatNo = 1 (bukan 2)
        playAyat(currentSurahId, 1, totalAyatGlobal, data);

    } catch(error) {
        console.error(error);
        alert("Error: " + error.message);
    }
}

    if (!data) {
        const res = await fetch(`juzAmma/${surahId}.json`);
        const json = await res.json();
        data = json[String(surahId)];
    }

    if (!currentTimestampData || currentTimestampData.surahId !== surahId) {
        console.warn("Timestamp belum dimuat");
    }

    currentSurahDataSync = data;
    currentTotalAyat = totalAyat;
    currentAyat = ayatNo;
    
    document.getElementById("activeSurahName").innerText = `${data.name_latin} - ${totalAyat} Ayat`;

    renderAyat(
    "",
    data.preface?.taawudz || "",
    "",
    data.preface?.taawudz_id || ""
);
    
    renderAyat(
    "",
    data.preface?.taawudz || "",
    "",
    data.preface?.taawudz_id || ""
);

    const fileNumber = surahId - 77;
    audio.src = `audio/${surahId}-${fileNumber}.m4a`;
    audio.onended = () => {

    if (isPlayAllMode) {

        if (currentSurahIndex < menuSurah.length - 1) {

            currentSurahIndex++;

            startSurah(menuSurah[currentSurahIndex].id);

        } else {

            isPlayAllMode = false;

            alert("Semua surah selesai diputar");

        }

    }

};
    audio.onloadedmetadata = () => {

    audio.currentTime = 0;

    updateAyatDisplay(currentSurahId, 0, data);

    if (isPlayAllMode) {
        audio.play();
    }

};
}

function updatePrevNextButtons() {

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    if (isPlayAllMode) {

        prevBtn.disabled = currentSurahIndex === 0;
        nextBtn.disabled = currentSurahIndex === menuSurah.length - 1;

    } else {

        prevBtn.disabled = currentSurahId === 78;
        nextBtn.disabled = currentSurahId === 114;

    }

}

function prevAyat() {

    audio.pause();

    if (currentSurahIndex > 0) {

        currentSurahIndex--;

        startSurah(menuSurah[currentSurahIndex].id);

    }

}

function nextAyat() {

    audio.pause();

    if (currentSurahIndex < menuSurah.length - 1) {

        currentSurahIndex++;

        startSurah(menuSurah[currentSurahIndex].id);

    }

}

function playAllSurahs() {

}

async function downloadAllSurahs() {
    if (!confirm("Download seluruh audio Juz Amma? Jumlah file cukup banyak.")) return;
    let totalFile = 0;

    for (const surah of menuSurah) {
        try {
            const res = await fetch(`juzAmma/${surah.id}.json`);
            const json = await res.json();
            const data = json[surah.id] || json;
            const totalAyat = parseInt(data.number_of_ayah);

            for (let i = 1; i <= totalAyat; i++) {
                const link = document.createElement('a');
                link.href = `audio/${surah.id}-${i}.m4a`;
                link.download = `${surah.id}-${i}.m4a`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                totalFile++;
                await new Promise(resolve => setTimeout(resolve, 800));
            }
        } catch(err) {
            console.error("Gagal download surah", surah.id, err);
        }
    }
    alert(`Selesai memproses ${totalFile} file audio.`);
}

let currentSyncHandler = null;
function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";

    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);

    return `${m}:${String(s).padStart(2, '0')}`;
}

function updateProgressBar() {

    const progress = document.getElementById("audioProgress");
    const current = document.getElementById("currentTime");
    const remaining = document.getElementById("remainingTime");

    if (!audio.duration) return;

    const percent =
        (audio.currentTime / audio.duration) * 100;

    progress.value = percent;

    progress.style.background =
        `linear-gradient(
            to right,
            #22c55e 0%,
            #22c55e ${percent}%,
            rgba(0,0,0,.12) ${percent}%,
            rgba(0,0,0,.12) 100%
        )`;

    current.textContent =
        formatTime(audio.currentTime);

    remaining.textContent =
        "-" +
        formatTime(
            audio.duration - audio.currentTime
        );
}
  
function stopAyatSync() {
    if (audio && currentSyncHandler) {
        audio.removeEventListener('timeupdate', currentSyncHandler);
        currentSyncHandler = null;
    }
}

function startAyatSync(data) {

    stopAyatSync();

    currentSyncHandler = () => {
        updateAyatFromTimestamp(
            audio.currentTime,
            data
        );
    };

    audio.addEventListener(
        "timeupdate",
        currentSyncHandler
    );

    updateAyatFromTimestamp(
        audio.currentTime,
        data
    );
}

function updateAyatFromTimestamp(currentTime, data) {
    if (!currentTimestampData?.timestamps || !data) return;

    const timestamps = currentTimestampData.timestamps;
    let activeEntry = null;

    for (let i = 0; i < timestamps.length; i++) {
        const current = timestamps[i];
        const next = timestamps[i + 1];

        if (currentTime >= current.time &&
            (!next || currentTime < next.time)) {

            activeEntry = current;
            break;
        }
    }

    if (!activeEntry) return;

    let newTahap = -1;

    if ("taawuz" in activeEntry) {

        newTahap = 0;

    } else if ("basmalah" in activeEntry) {

        newTahap = 1;

    } else if ("ayat" in activeEntry) {

        // Ayat 1 menjadi tahap 2
        newTahap = activeEntry.ayat + 1;

    }

    if (newTahap === currentTahap) return;

    currentTahap = newTahap;

    updateAyatDisplay(currentSurahId, newTahap, data);
}


function updateAyatDisplay(surahId, tahap, data) {

    let arab = "";
    let indo = "";
    let aboveArab = "";
    let nextArab = "";

    // =====================
    // TA'AWUDZ
    // =====================
    if (tahap === 0) {

        arab = data.preface?.taawudz || "";
        indo = data.preface?.taawudz_id || "";

        nextArab = data.preface?.basmalah || "";

        renderAyat(
            "",
            arab,
            nextArab,
            indo
        );

        return;
    }

    // =====================
    // BASMALAH
    // =====================
    if (tahap === 1) {

        arab = data.preface?.basmalah || "";
        indo = data.preface?.basmalah_id || "";

        aboveArab = data.preface?.taawudz || "";
        nextArab = data.text?.["1"] || "";

        renderAyat(
            aboveArab,
            arab,
            nextArab,
            indo
        );

        return;
    }

    // =====================
    // AYAT
    // tahap 2 = ayat 1
    // tahap 3 = ayat 2
    // dst
    // =====================

    const ayatNo = tahap - 1;

    arab = data.text?.[String(ayatNo)] || "";
    indo = data.translations?.id?.text?.[String(ayatNo)] || "";

    if (ayatNo === 1) {

        aboveArab = data.preface?.basmalah || "";

    } else {

        aboveArab = data.text?.[String(ayatNo - 1)] || "";

    }

    nextArab = data.text?.[String(ayatNo + 1)] || "";

    renderAyat(
        aboveArab,
        arab,
        nextArab,
        indo
    );
}
