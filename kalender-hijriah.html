<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kalender Hijriah Pro</title>
<link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <style>
  
.logo {
    color: #fff;
    font-weight: 700;
}

.btn {
    border: none;
    cursor: pointer;
}

.iconbtn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fff;
}

.tabs {
    display: flex;
    width: 100%;
    max-width: 950px; /* samakan dengan .wrap */
    margin: 55px auto 10px;
    padding: 5px;

    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-sizing: border-box;
}
@media (max-width: 600px) {
    .tabs {
        width: calc(100% - 20px);
        max-width: none;
        margin: 55px auto 5px;
    }

    .tab {
        padding: 10px;
        font-size: 14px;
    }
}
.tab {
    flex: 1;
    padding: 12px;
    border: 0;
    background: 0;
    border-radius: 10px;
    font-weight: 700;
}

.active {
    background: var(--primary)!important;
    color: #fff;
}

.wrap {
    max-width: 950px;
    margin: auto;
    padding: 10px;
}

.panel {
    background: var(--card);
    border-radius: 10px;
    padding: 15px;
}

.monthhead {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.months {
    text-align: center;
}

.hm {
    font-size: 17px;
    font-weight: 700;
    color: var(--menu-text);
}

.gm {
    font-size: 12px;
    opacity: .7;
    margin-top: 10px;
}

.nav {
    background: var(--primary);
    color: #fff;
    width: 42px;
    height: 42px;
    border-radius: 12px;
}

.week,
.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 13px;
}

.week {
    margin-top: 1px;
}

.week div {
    text-align: center;
    font-weight: 800;
    padding: 8px 0;
}

.day {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    min-height: 85px;
    padding: 6px 2px;
    gap: 2px;
    overflow: hidden;

    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;

    transition: all 0.2s ease;
}

.day:hover {
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
}

.main {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1;
}

.sub {
    font-size: 0.6rem;
    opacity: 0.6;
    line-height: 1;
    margin-bottom: 4px;
}

/* Mode terang */
.today .main {
    width: 30px;
    height: 30px;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Mode gelap */
body.dark .today .main {
    background: #fff;
    color: #000;
}

.badge {
    position: absolute;
    bottom: 2px;
    left: 2px;
    right: 2px;
    font-size: 0.5px;
    line-height: 1;
    color: #c53030;
    font-weight: 500;
    text-align: center;
    white-space: wrap 2;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 2px;
}

.fast {
    font-size: 7px;
    color: #319795;
    white-space: nowrap;
}

@media(max-width: 600px) {
    .day {
        min-height: 65px;
        padding: 4px 1px;
    }
    .main {
        font-size: 1.95rem;
    }
    .sub {
        font-size: 0.5rem;
    }
}

.info {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
}

.pill {
    background: #e6fffa;
    padding: 6px 10px;
    border-radius: 12px;
    font-size: 12px;
}

.fade {
    animation: slide .25s;
}

@keyframes slide {
    from {
        opacity: 0;
        transform: translateX(15px);
    }
    to {
        opacity: 1;
        transform: none;
    }
}

@media(max-width: 600px) {
    .day {
        min-height: 72px;
    }
    .main {
        font-size: 14px;
    }
}

.holiday .main {
    color: #e53e3e;
    font-weight: 800;
}

.day.sunday .main {
    color: #e53e3e !important;
    font-weight: 800;
}

.day.friday .main {
    color: #50C878 !important;
    font-weight: 800;
}

.day.holiday .main {
    color: #e53e3e !important;
    font-weight: 800;
}

.day.holiday {
    background-color: #fff5f5;
}

[data-theme=dark] .day.holiday {
    background-color: rgba(255, 255, 255, 0.1);
}

.holiday-info {
    margin-top: -2px;
    padding: 10px;
    text-align: left;
    color: #e53e3e;
    font-size: 10px;
    font-weight: 700;
    border-radius: 12px;
    line-height: 1.7;
}

[data-theme="dark"] .holiday-info {
    color: #fc8181;
}

.header-left,
.header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.page-title {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
}

.months .gm {
    font-size: 12px;
    opacity: .7;
}

.months.gregorian-mode .gm {
    font-size: 20px;
    font-weight: 700;
    opacity: 1;
    color: var(--text-color);
}
/* Pastikan ini ada di bagian CSS Anda */
.week-wrapper {
    margin-top: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
}

.grid-wrapper {
    margin-top: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
}

.week {
    margin-top: 0;
}

.week div {
    text-align: center;
    font-weight: 700;
    padding: 8px 0;
}

.grid {
    width: 100%;
}
.day-header {
    background: var(--card); /* Mengikuti warna kartu */
    border: 1px solid var(--border); /* Mengikuti border tanggal */
    border-radius: 12px; /* Lengkungan sudut */
    padding: 8px 0;
    text-align: center;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Opsional: Membuat warna khusus untuk hari libur di header */
.week .day-header:first-child { color: #e53e3e; } /* Ahad/Minggu */

.panel,
.week-wrapper,
.grid-wrapper,
.day{
    box-shadow: 0 3px 12px rgba(0,0,0,.08);
}
.day-header,
.day {
    box-shadow: 0 3px 10px rgba(0,0,0,.06);
}
    
</style>
</head>
<body>

<div class="top-header">

    <!-- Tombol Back -->
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>

    <!-- Judul -->
    <div class="header-title" id="headerTitle">
        Kalender
    </div>

    <!-- Tombol Drawer -->
    <button id="drawerBtn" class="header-icon-btn drawer-btn">
        <i class="fa-solid fa-sliders"></i>
    </button>

    <!-- Drawer -->
    <div id="headerDrawer" class="header-drawer">

        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <button id="themeToggle" class="theme-toggle">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>

        <button id="fontSizeBtn" class="control-btn">
            <i class="fa-solid fa-maximize"></i>
        </button>

        <button id="wakeLockBtn" class="control-btn">
            <i class="fa-solid fa-mobile-screen-button"></i>
        </button>

    </div>

</div>
<div id="fontSliderBox" class="font-slider-box">
    <input
        id="fontSlider"
        type="range"
        min="1.2"
        max="3"
        step="0.1"
        value="1.4">

    <span id="fontValue">1.4</span>
</div>

<div class="tabs">
    <button id="hTab" class="tab active">Hijriah</button>
    <button id="gTab" class="tab">Masehi</button>
</div>

<div class="wrap">
    <div class="panel">
        <div class="monthhead">
            <button id="prev" class="btn nav"><i class="fa fa-chevron-left"></i></button>
            <div class="months">
                <div id="hm" class="hm"></div>
                <div id="gm" class="gm"></div>
            </div>
            <button id="next" class="btn nav"><i class="fa fa-chevron-right"></i></button>
        </div>
  
    </div>
    <div class="week-wrapper">
    <div class="week">
        <div class="day-header">Ahad</div>
        <div class="day-header">Senin</div>
        <div class="day-header">Selasa</div>
        <div class="day-header">Rabu</div>
        <div class="day-header">Kamis</div>
        <div class="day-header">Jumat</div>
        <div class="day-header">Sabtu</div>
    </div>
</div>

<div class="grid-wrapper">
<div id="grid" class="grid"></div>
</div>
        <div id="holidayInfo" class="holiday-info"></div>
<script>
let mode = 'hijri';
let now = new Date();
let month = now.getMonth() + 1;
let year = now.getFullYear();

function updateThemeIcon(theme) {
    const icon = document.querySelector(".toggle-icon");
    if (icon) {
        icon.className = theme === "dark"
            ? "fa-solid fa-moon toggle-icon"
            : "fa-solid fa-sun toggle-icon";
    }
}

/* =========================
   DARK MODE
========================= */
if(localStorage.theme === 'dark'){
    document.documentElement.dataset.theme = 'dark';
}
updateThemeIcon(localStorage.theme || "light");

const themeBtn = document.getElementById("themeToggle");
const hTab = document.getElementById("hTab");
const gTab = document.getElementById("gTab");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const grid = document.getElementById("grid");
const hm = document.getElementById("hm");
const gm = document.getElementById("gm");
const holidayInfo = document.getElementById("holidayInfo");

/* =========================
   TAB
========================= */
function activate(){
    hTab.classList.toggle("active", mode === "hijri");
    gTab.classList.toggle("active", mode === "gregorian");
}

function updateWeekDays() {
    const weekDiv = document.querySelector('.week');
    const days = weekDiv.querySelectorAll('div');

    // Hari pertama
    if (mode === "gregorian") {
        days[0].textContent = "Minggu";
        days[0].style.color = "#e53e3e";
        days[0].style.fontWeight = "700";
    } else {
        days[0].textContent = "Ahad";
        days[0].style.color = "";
        days[0].style.fontWeight = "";
    }

    // Jumat hanya hijau di kalender Hijriah
    days[5].style.color = "";
    days[5].style.fontWeight = "";

    if (mode === "hijri") {
        days[5].style.color = "#50C878";
        days[5].style.fontWeight = "700";
    }
}

hTab.onclick = () => {
    mode = "hijri";
    activate();
    updateWeekDays();
    render();
};

gTab.onclick = () => {
    mode = "gregorian";
    activate();
    updateWeekDays();
    render();
};

/* =========================
   BULAN
========================= */
prev.onclick = () => {
    month--;
    if(month < 1){
        month = 12;
        year--;
    }
    render();
};

next.onclick = () => {
    month++;
    if(month > 12){
        month = 1;
        year++;
    }
    render();
};

/* =========================
   LIBUR NASIONAL 2026
========================= */
const nationalHolidays = {
    "2026-01-01": "Tahun Baru 2026 Masehi",
    "2026-01-16": "Isra Mi'raj Nabi Muhammad SAW",
    "2026-02-17": "Tahun Baru Imlek 2577",
    "2026-03-19": "Hari Suci Nyepi",
    "2026-03-21": "Idul Fitri 1447H",
    "2026-03-22": "Idul Fitri 1447H",
    "2026-04-03": "Wafat Yesus Kristus",
    "2026-04-05": "Paskah",
    "2026-05-01": "Hari Buruh",
    "2026-05-14": "Kenaikan Yesus Kristus",
    "2026-05-27": "Idul Adha 1447H",
    "2026-05-31": "Hari Raya Waisak",
    "2026-06-01": "Hari Lahir Pancasila",
    "2026-06-16": "Tahun Baru Islam 1448H",
    "2026-08-17": "Hari Kemerdekaan RI",
    "2026-12-25": "Hari Natal"
};

const islamicHolidays = {
    "1-1": "Tahun Baru Islam",
    "1-10": "Puasa Asyura",
    "3-12": "Maulid Nabi Muhammad SAW",
    "7-27": "Isra Mi'raj",
    "9-17": "Nuzulul Qur'an",
    "10-1": "Idul Fitri",
    "10-2": "Idul Fitri",
    "12-9": "Wukuf Arafah",
    "12-10": "Idul Adha",
    "12-11": "Hari Tasyrik",
    "12-12": "Hari Tasyrik",
    "12-13": "Hari Tasyrik"
};

/* =========================
   RENDER KALENDER
========================= */
async function render(){
    try{
        const res = await fetch(`https://api.aladhan.com/v1/gToHCalendar/${month}/${year}`);
        const json = await res.json();

        if(!json.data){
            throw new Error("Data kalender kosong");
        }

        const data = json.data;
        grid.className = "grid fade";
        grid.innerHTML = "";

        if(mode === "hijri"){
            hm.textContent = `${data[0].hijri.month.en} ${data[0].hijri.year} H`;
            hm.style.display = "block";
        } else {
            hm.style.display = "none";
        }

        gm.textContent = new Date(year, month - 1, 1).toLocaleDateString("id-ID", {
            month: "long",
            year: "numeric"
        });

        const firstDay = new Date(year, month - 1, 1).getDay();

        for(let i = 0; i < firstDay; i++){
            grid.appendChild(document.createElement("div"));
        }

        let holidayList = [];
        data.forEach(item => {
            const gd = parseInt(item.gregorian.day);
            const hd = parseInt(item.hijri.day);
            const hmNum = item.hijri.month.number;

            const el = document.createElement("div");
            const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(gd).padStart(2,'0')}`;
            const nationalHoliday = nationalHolidays[dateKey] || "";
            const islamicHoliday = islamicHolidays[hmNum + "-" + hd] || "";

            if(mode === "hijri"){
                if(islamicHoliday){
                    holidayList.push(`${hd} ${item.hijri.month.en} - ${islamicHoliday}`);
                }
            } else {
                if(nationalHoliday){
                    const dateText = new Date(year, month - 1, gd).toLocaleDateString("id-ID",{
                        day:"numeric",
                        month:"long"
                    });
                    holidayList.push(`${dateText} - ${nationalHoliday}`);
                }
            }

            el.className = "day";

            if(mode === "gregorian" && nationalHoliday){
                el.classList.add("holiday");
            }

            if(mode === "hijri" && islamicHoliday){
                el.classList.add("holiday");
            }

            const dayOfWeek = new Date(year, month - 1, gd).getDay();

            if(mode === "hijri" && dayOfWeek === 5){
                el.classList.add("friday");
            }

            if(mode === "gregorian" && dayOfWeek === 0 && !nationalHoliday){
                el.classList.add("sunday");
            }

            if(gd === now.getDate() && month === now.getMonth()+1 && year === now.getFullYear()){
                el.classList.add("today");
            }

            const subStyle = mode === "gregorian" ? "display:none" : (nationalHoliday ? "color:#e53e3e;font-weight:700;" : "");

            el.innerHTML = `
                <div class="main">${mode === "hijri" ? hd : gd}</div>
                <div class="sub" style="${subStyle}">${mode === "hijri" ? gd : hd}</div>
            `;

            grid.appendChild(el);
        });

        holidayInfo.innerHTML = holidayList.length ? holidayList.join("<br>") : "";

    } catch(err){
        console.error(err);
        grid.innerHTML = `<div style="padding:20px; text-align:center; color:red;">Gagal memuat kalender: ${err.message}</div>`;
    }

    const months = document.querySelector(".months");
    if(mode === "gregorian"){
        months.classList.add("gregorian-mode");
    } else {
        months.classList.remove("gregorian-mode");
    }
}

/* =========================
   SWIPE
========================= */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].screenX;
    if(diff > 50){
        next.click();
    }
    if(diff < -50){
        prev.click();
    }
});

/* =========================
   START KALENDER
========================= */
activate();
updateWeekDays();
render();
</script>

<script src="js/header.js"></script>
</body>
</html>
