<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jurnal Ibadah & Aktivitas</title>
<link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
<style>

/* Layout */
.wrap {
    max-width: 700px;
    margin: 70px auto 0;
    padding: 15px;
}

/* Cards */
.card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    margin-bottom: 12px;
    padding: 15px;
}

.card h3 {
    margin: 2px 0 8px;
    font-size: 1rem;
}

/* Card khusus */
.card-progress {
    padding: 10px 12px;
    margin-top: -25px;
}

.card-ibadah {
    padding: 15px;
}

.card-notes {
    padding: 16px;
}

.card-weekly,
.card-monthly {
    padding: 12px;
}

.card-achievement {
    padding: 14px;
}

.card-export {
    padding: 12px;
}

/* Progress */
.progress-wrap {
    position: relative;
    margin-top: 6px;
}

.progress {
    height: 6px;
    background: #e2e8f0;
    border-radius: 999px;
    overflow: hidden;
    position: relative;
}

.bar {
    height: 100%;
    background: var(--primary);
    width: 0%;
    border-radius: 999px;
    transition: width 0.3s ease;
}

.percent-label {
    position: absolute;
    top: -20px;
    right: 0;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--primary);
    line-height: 1;
}

/* Form elements */
.item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
}

.item label {
    flex: 1;
    display: block;
    line-height: 1.4;
    word-break: break-word;
}

.item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    margin: 0;
    accent-color: var(--primary);
}

textarea,
input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
}

button {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}

.badge {
    display: inline-block;
    padding: 6px 10px;
    background: #e6fffa;
    border-radius: 999px;
    margin: 4px;
}

[data-theme="dark"] .badge {
    background: rgba(79, 209, 197, 0.12);
    color: #4fd1c5;
}
</style>
</head>
<body>
<div class="top-header">

    <!-- Tombol Back -->
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>

    <!-- Judul -->
    <div class="header-title" id="headerTitle">
        Jurnal Ibadah
    </div>
    
    <!-- Tombol Drawer -->
    <button id="drawerBtn" class="header-icon-btn drawer-btn">
        <i class="fa-solid fa-sliders"></i>
    </button>

    <!-- Drawer -->
    <div id="headerDrawer" class="header-drawer">

        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <button id="themeToggle" class="theme-toggle">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>

        <button id="fontSizeBtn" class="control-btn">
            <i class="fa-solid fa-maximize"></i>
        </button>

        <button id="wakeLockBtn" class="control-btn">
            <i class="fa-solid fa-mobile-screen-button"></i>
        </button>

    </div>

</div>


<div class="wrap">
<div class="card card-progress">
<h3>Progress Hari Ini</h3>
<div class="progress-wrap">
    <div class="percent-label" id="percent">0%</div>
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>
</div>
</div>

<div class="card card-ibadah">
<h3>🕌 Tracker Ibadah</h3>
<div id="ibadah"></div>
</div>

<div class="card card-notes">
<h3>📝 Catatan Harian</h3>
<input id="judul" placeholder="Judul catatan">
<br><br>
<textarea id="isi" rows="4" placeholder="Tulis kegiatan hari ini..."></textarea>
<br><br>
<button onclick="simpanCatatan()">Simpan Catatan</button>
<div id="catatan"></div>
</div>

<div class="card card-weekly">
<h3>🎯 Target Mingguan</h3>
<textarea id="mingguan"></textarea>
</div>

<div class="card card-monthly">
<h3>📅 Target Bulanan</h3>
<textarea id="bulanan"></textarea>
</div>

<div class="card card-achievement">
<h3>🏆 Pencapaian</h3>
<div id="badge"></div>
</div>

<div class="card card-export">
<button onclick="exportData()">Export Data</button>
<input type="file" onchange="importData(event)">
</div>
</div>

<script>
    function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        // Jika tidak ada history, kembali ke halaman sebelumnya atau reload
        document.referrer ? window.location.href = document.referrer : window.location.reload();
    }
}
const items=["Subuh","Dzuhur","Ashar","Magrib","Isya","Dhuha","Tahajud","Witir","Tilawah","Dzikir Pagi","Dzikir Petang","Sedekah"];
const box=document.getElementById("ibadah");

function load(){
 let data=JSON.parse(localStorage.getItem("jurnal")||"{}");
 box.innerHTML="";
 items.forEach(x=>{
  let c=document.createElement("div");
  c.className="item";
  c.innerHTML = `
    <label>${x}</label>
    <input type="checkbox" ${data[x] ? "checked" : ""} onchange="toggle('${x}', this.checked)">
`;
  box.appendChild(c);
 });
 update();
 document.getElementById("catatan").innerHTML=localStorage.getItem("catatanHtml")||"";
 document.getElementById("mingguan").value=localStorage.getItem("mingguan")||"";
 document.getElementById("bulanan").value=localStorage.getItem("bulanan")||"";
}

function toggle(n,v){
 let d=JSON.parse(localStorage.getItem("jurnal")||"{}");
 d[n]=v;
 localStorage.setItem("jurnal",JSON.stringify(d));
 update();
}

function update(){
 let d=JSON.parse(localStorage.getItem("jurnal")||"{}");
 let done=Object.values(d).filter(Boolean).length;
 let p=Math.round(done/items.length*100);
 document.getElementById("bar").style.width=p+"%";
 document.getElementById("percent").textContent=p+"%";
 let b=[];
 if(p>=25)b.push("🥉 Pemula");
 if(p>=50)b.push("🥈 Istiqamah");
 if(p>=80)b.push("🥇 Sangat Aktif");
 if(p==100)b.push("👑 Hari Sempurna");
 document.getElementById("badge").innerHTML=b.map(x=>`<span class="badge">${x}</span>`).join("");
}

function simpanCatatan(){
 let j=document.getElementById("judul").value;
 let i=document.getElementById("isi").value;
 let html="<div class='card'><b>"+j+"</b><br>"+i+"</div>"+(localStorage.getItem("catatanHtml")||"");
 localStorage.setItem("catatanHtml",html);
 document.getElementById("catatan").innerHTML=html;
}

setInterval(()=>{
 localStorage.setItem("mingguan",document.getElementById("mingguan").value);
 localStorage.setItem("bulanan",document.getElementById("bulanan").value);
},1000);

function exportData(){
 let data={};
 for(let i=0;i<localStorage.length;i++){
   let k=localStorage.key(i);
   data[k]=localStorage.getItem(k);
 }
 let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="jurnal-ibadah.json";
 a.click();
}

function importData(e){
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
   let d=JSON.parse(r.result);
   Object.keys(d).forEach(k=>localStorage.setItem(k,d[k]));
   location.reload();
 };
 r.readAsText(f);
}
load();
</script>
<script>
// Tombol Back berfungsi


// Search Toggle
const searchToggle = document.getElementById("searchToggle");
const searchWrapper = document.getElementById("searchWrapper");

searchToggle.addEventListener("click", () => {
    searchWrapper.classList.toggle("active");
});

// Theme Toggle
const themeToggle = document.getElementById("themeToggle");
const icon = document.querySelector(".toggle-icon");

// Load tema tersimpan
const savedTheme = localStorage.getItem("theme");
if (savedTheme) {
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateThemeIcon(savedTheme);
}

themeToggle.addEventListener("click", () => {
    const currentTheme = document.documentElement.getAttribute("data-theme");
    const newTheme = currentTheme === "dark" ? "light" : "dark";
    
    document.documentElement.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    updateThemeIcon(newTheme);
    
    // Animasi icon
    icon.style.transform = "rotate(360deg) scale(1.2)";
    setTimeout(() => {
        icon.style.transform = "rotate(0deg) scale(1)";
    }, 150);
});

function updateThemeIcon(theme) {
    if (theme === "dark") {
        icon.className = "fa-solid fa-moon toggle-icon";
    } else {
        icon.className = "fa-solid fa-sun toggle-icon";
    }
}
  document.addEventListener("DOMContentLoaded", () => {
  const searchBox = document.querySelector(".search-box input");

  const suggestionBox = document.createElement("div");
  suggestionBox.className = "suggestion-box";
  searchBox.parentNode.appendChild(suggestionBox);

  const pages = {
    "dzikir pagi": "dzikir-pagi.html",
    "dzikir petang": "dzikir-petang.html",
    "dzikir shalat": "dzikir-setelah-solat.html",
    "doa harian": "doa-harian.html",
    "kumpulan doa": "kumpulan-doa.html",
    "bacaan shalat": "bacaan-shalat.html",
    "juz amma": "juz-amma.html",
    "kalender hijriah": "kalender-hijriah.html",
    "hafalan": "hafalan.html",
    "tasbih": "tasbih.html",
    "kisah nabi": "kisah-nabi.html",
    "hadits": "intent://#Intent;package=com.saltanera.hadits;end",
    "kiblat": "arah-kiblat.html"
  };

  let currentFocus = -1;
  let history = JSON.parse(localStorage.getItem("searchHistory")) || {};

  // tampilkan suggestion saat mengetik
  searchBox.addEventListener("input", () => {
    const query = searchBox.value.trim().toLowerCase();
    suggestionBox.innerHTML = "";
    currentFocus = -1;

    if (!query) {
      showHistory();
      return;
    }

    const historyMatches = Object.keys(history)
      .filter(item => item.includes(query))
      .sort((a, b) => history[b].count - history[a].count);

    const pageMatches = Object.keys(pages).filter(key => key.includes(query));

    if (historyMatches.length > 0) {
      historyMatches.forEach(itemText => {
        const item = document.createElement("div");
        item.className = "suggestion-item history";

        const regex = new RegExp(`(${query})`, "gi");
        const lastTime = timeAgo(history[itemText].last);
        item.innerHTML = `🕘 ${itemText.replace(regex, "<b>$1</b>")} (${history[itemText].count}x, terakhir ${lastTime})`;

        item.addEventListener("click", () => {
          runSearch(itemText);
        });

        const deleteBtn = document.createElement("span");
        deleteBtn.textContent = "❌";
        deleteBtn.className = "delete-history";
        deleteBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          delete history[itemText];
          localStorage.setItem("searchHistory", JSON.stringify(history));
          searchBox.dispatchEvent(new Event("input"));
        });

        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.appendChild(deleteBtn);

        suggestionBox.appendChild(item);
      });
    }

    if (pageMatches.length > 0) {
      pageMatches.forEach(match => {
        const item = document.createElement("div");
        item.className = "suggestion-item";

        const regex = new RegExp(`(${query})`, "gi");
        item.innerHTML = match.replace(regex, "<b>$1</b>");

        item.addEventListener("click", () => {
          goToPage(pages[match], match);
        });
        suggestionBox.appendChild(item);
      });
    }

    if (historyMatches.length === 0 && pageMatches.length === 0) {
      const errorMsg = document.createElement("div");
errorMsg.className = "search-error";
errorMsg.innerHTML = `
<span class="search-error-icon">❌</span>
<span>Kata kunci salah</span>
`;

suggestionBox.appendChild(errorMsg);
    }
  });

  // navigasi dengan keyboard
  searchBox.addEventListener("keydown", e => {
    let items = suggestionBox.querySelectorAll(".suggestion-item");
    if (e.key === "ArrowDown") {
      currentFocus++;
      addActive(items);
    } else if (e.key === "ArrowUp") {
      currentFocus--;
      addActive(items);
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (currentFocus > -1 && items[currentFocus]) {
        items[currentFocus].click();
      } else {
        runSearch(searchBox.value.trim().toLowerCase());
      }
    }
  });

  function addActive(items) {
    if (!items) return;
    removeActive(items);
    if (currentFocus >= items.length) currentFocus = 0;
    if (currentFocus < 0) currentFocus = items.length - 1;
    items[currentFocus].classList.add("active");
  }

  function removeActive(items) {
    items.forEach(item => item.classList.remove("active"));
  }

  if (searchIcon) {
    searchIcon.addEventListener("click", () => {
      runSearch(searchBox.value.trim().toLowerCase());
    });
  }

  function runSearch(query) {
    console.log("Mencari:", query);
    if (pages[query]) {
      goToPage(pages[query], query);
    } else {
      suggestionBox.innerHTML = "<small style='color:red; padding-left: 10px;'>❌ Kata kunci salah</small>";


    }
  }

  function goToPage(url, query) {
    searchBox.value = "";
    suggestionBox.innerHTML = "";

    if (query) {
      if (!history[query]) {
        history[query] = { count: 0, last: Date.now() };
      }
      history[query].count++;
      history[query].last = Date.now();
      localStorage.setItem("searchHistory", JSON.stringify(history));
    }

    window.location.href = url;
  }

  function showHistory() {
    suggestionBox.innerHTML = "";
    const sortedHistory = Object.keys(history).sort((a, b) => history[b].count - history[a].count);

    if (sortedHistory.length > 0) {
      sortedHistory.slice(0, 5).forEach(itemText => {
        const item = document.createElement("div");
        item.className = "suggestion-item history";
        const lastTime = timeAgo(history[itemText].last);
        item.textContent = `🕘 ${itemText} (${history[itemText].count}x, terakhir ${lastTime})`;

        item.addEventListener("click", () => {
          runSearch(itemText);
        });

        const deleteBtn = document.createElement("span");
        deleteBtn.textContent = "❌";
        deleteBtn.className = "delete-history";
        deleteBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          delete history[itemText];
          localStorage.setItem("searchHistory", JSON.stringify(history));
          showHistory();
        });

        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.appendChild(deleteBtn);

        suggestionBox.appendChild(item);
      });

      const clearBtn = document.createElement("div");
      clearBtn.className = "clear-history";
      clearBtn.innerHTML =
'<i class="fa-solid fa-broom"></i> Bersihkan Riwayat';
      clearBtn.addEventListener("click", () => {
        history = {};
        localStorage.removeItem("searchHistory");
        suggestionBox.innerHTML = "<small style='color:gray'>Riwayat telah dihapus</small>";
      });
      suggestionBox.appendChild(clearBtn);
    }
  }

  // fungsi untuk menampilkan "2 hari lalu", "5 menit lalu", dll
  function timeAgo(timestamp) {
    const diff = Date.now() - timestamp;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (days > 0) return `${days} hari lalu`;
    if (hours > 0) return `${hours} jam lalu`;
    if (minutes > 0) return `${minutes} menit lalu`;
    return "baru saja";
  }
});
document.addEventListener("click", (e) => {
    if (!searchWrapper.contains(e.target)) {
        searchWrapper.classList.remove("active");
    }
});

</script>
<script src="js/header.js"></script>
</body>
</html>
