.guide-item{

.guide-section{

.guide-heading{

.guide-content{

.guide-list{

.number{

.guide-desc{

.dzikir-actions{

}

.dzikir-actions button{

    background:var(--primary);

    cursor:pointer;
    font-size:13px;
}

.guide-section .dzikir-card{
    width:calc(100% + 0px);
    margin-left:-18px;

<script>
async function loadRuqyah(){

    const res = await fetch("json/ayat_ruqyah.json");
    const data = await res.json();

    renderPersiapan(data.guide.persiapan);

    renderLangkah(data.guide.langkah);

    renderAyat(data.ayat_ruqyah);

    renderDoaSakit(data.doa_sakit);

    renderTidur(
    data.guide.sebelum_tidur,
    data.ayat_ruqyah
);

    renderDoaTerluka(data.doa_terluka);

}
  loadRuqyah();
  renderCatatanPenting();
  renderReferensi();
function renderPersiapan(items){

    let html = `
    <div class="guide-section" id="persiapan">
    <div class="guide-heading">
        Persiapan Sebelum Ruqyah
    </div>
    `;

    items.forEach((item,index)=>{

        html += `
        <div class="guide-item">

            <div class="number">
                ${index+1}
            </div>

            <div class="guide-content">

                <div class="guide-title">
                    ${item.title}
                </div>

                <div class="guide-desc">
                    ${item.description}
                </div>

            </div>

        </div>
        `;

    });

    html += `</div>`;

    document.getElementById("guidePersiapan").innerHTML = html;
}
function renderAyat(items){

    let html=`
    <div class="guide-section" id="ayat">
    <h2>Ayat Ruqyah</h2>
      `;

    items.forEach(item=>{

        html += `
<div class="dzikir-card">

    <div class="dzikir-title">
        ${item.title}
    </div>

    <div class="arabic">
        ${item.arabic}
    </div>

    <div class="hidden-box">

        <div class="latin hidden-content">
            ${item.latin}
        </div>

        <div class="translation hidden-content">
            ${item.terjemahan}
        </div>

    </div>

    <div class="info-actions">

    <button class="action-btn"
            onclick="toggleDzikir(this)">
        Arti
    </button>

    <button class="menu-btn"
            onclick="toggleActionMenu(this)">
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </button>

    <div class="action-menu">

        <button onclick="toggleLatin(this)">

        </button>

        <button onclick="copyDzikir(this)">

        <button onclick="shareDzikir(this)">

</div>
</div>
`;

}

function renderTidur(guide, ayat){

    const tidur = guide[0];

    let html = `
    <div class="guide-section" id="tidur">

        <h2>${tidur.title}</h2>

        <div class="guide-desc">
            Lakukan amalan berikut setiap malam sebelum tidur sebagai bentuk perlindungan diri dengan izin Allah.
        </div>

        <ol class="guide-list">
    `;

    tidur.steps.forEach(step=>{
        html += `<li>${step}</li>`;
    });

    html += `</ol>`;

    // Ambil 3 surat terakhir dari ayat_ruqyah
    const suratTidur = ayat.filter(item =>
        item.title.includes("Al-Ikhlas") ||
        item.title.includes("Al-Falaq") ||
        item.title.includes("An-Nas")
    );

    suratTidur.forEach(item=>{

        html += `
        <div class="dzikir-card">

            <div class="dzikir-title">
                ${item.title}
            </div>

            <div class="arabic">

<div class="latin hidden-content">
    ${item.latin}
</div>

<div class="translation hidden-content">
    ${item.terjemahan}
</div>

            onclick="toggleDzikir(this)">

            onclick="toggleActionMenu(this)">
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </button>

        </button>

        <button onclick="copyDzikir(this)">
            Salin
        </button>

        <button onclick="shareDzikir(this)">
            Bagikan
        </button>

    </div>

</div>


        </div>
        `;

function toggleContent(btn, type){

    const card = btn.closest(".dzikir-card");
    const target = card.querySelector("." + type);

    if(target.style.display === "block"){
        target.style.display = "none";
    }else{
        target.style.display = "block";
    }

}

const menuRuqyah = [
    {id:"persiapan",title:"Persiapan Sebelum Ruqyah"},
    {id:"langkah",title:"Tata Cara Ruqyah"},
    {id:"ayat",title:"Ayat Ruqyah"},
    {id:"sakit",title:"Doa Saat Sakit"},
    {id:"tidur",title:"Ruqyah Sebelum Tidur"},
    {id:"terluka",title:"Doa Saat Terluka"},
    {id:"catatan", title:"Catatan Penting"},
    {id:"referensi", title:"Referensi"}
];
const listDrawer = document.getElementById("doaListDrawer");
listDrawer.insertAdjacentHTML(
    "beforeend",
    `
    <div class="doa-list-header">
        Daftar Isi Ruqyah
    </div>
    `
);
menuRuqyah.forEach((item, index) => {

    listDrawer.insertAdjacentHTML(
        "beforeend",
        `
        <div class="doa-list-item"
             data-target="${item.id}">
            ${index + 1}. ${item.title}
        </div>
        `
    );

});
document.querySelectorAll(".doa-list-item").forEach(item => {

    item.addEventListener("click", () => {

        const target = document.getElementById(item.dataset.target);

        if (target) {
            target.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        }

        doaListDrawer.classList.remove("show");
    });

});

async function sharePdf() {

    const overlay = document.getElementById("pdfLoadingOverlay");
    const element = document.getElementById("pdfContent");

    if (!element) {
        alert("Konten PDF tidak ditemukan.");
        return;
    }

    overlay.style.display = "flex";

    requestAnimationFrame(() => {
        overlay.classList.add("show");
    });

    await new Promise(resolve => setTimeout(resolve, 200));
document.querySelector(".top-header")?.style.setProperty("display","none");

document.querySelector(".active-dzikir-box")?.style.setProperty("display","none");

document.querySelector("#tasbihPopup")?.style.setProperty("display","none");
document.querySelectorAll(".info-actions").forEach(el => {
    el.style.display = "none";
});
document.querySelectorAll(".tasbih-link").forEach(el => {
    el.style.display = "none";
});

    try {
element.classList.add("pdf-export");
      document.querySelectorAll("#pdfContent.pdf-export .arabic").forEach(el => {
    el.innerHTML = el.innerHTML
        .replace(/،/g,'<span class="punct">،</span>')
        .replace(/:/g,'<span class="punct">:</span>');
});
        const opt = {
            margin: 8,
            filename: "Kumpulan-Doa-Pilihan.pdf",
            image: {
                type: "jpeg",
                quality: 1
            },
            html2canvas: {
            scale: 1.3,
            useCORS: true,
            scrollY: 0
},
            jsPDF: {
                unit: "mm",
                format: "a4",
                orientation: "portrait"
            },
            pagebreak: {
                mode: ["css", "legacy"]
            }
        };

document.querySelectorAll(".latin").forEach(el => {
    el.style.display = "block";
});

document.querySelectorAll(".translation").forEach(el => {
    el.style.display = "block";
});


// Tunggu browser merender perubahan
await new Promise(resolve => requestAnimationFrame(resolve));
await new Promise(resolve => requestAnimationFrame(resolve));
        const worker = html2pdf().set(opt).from(element);

        const pdf = await worker.toPdf().get("pdf");

        const blob = pdf.output("blob");

        const file = new File(
            [blob],
            "Kumpulan-Doa-Pilihan.pdf",
            {
                type: "application/pdf"
            }
        );

        if (
            navigator.canShare &&
            navigator.canShare({ files: [file] })
        ) {

            await navigator.share({
                title: "Kumpulan Doa Pilihan",
                text: "Kumpulan Doa Pilihan PDF",
                files: [file]
            });

        } else {

            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "Kumpulan-Doa-Pilihan.pdf";
            a.click();

            URL.revokeObjectURL(url);

            alert("Browser tidak mendukung berbagi file. PDF telah diunduh.");
        }

    } catch (err) {

        console.error(err);

        alert("Gagal membagikan PDF, Silahkan Ulangi.");

    } finally {

document.querySelector(".top-header")?.style.removeProperty("display");

document.querySelector(".active-dzikir-box")?.style.removeProperty("display");

document.querySelector("#tasbihPopup")?.style.removeProperty("display");
document.querySelectorAll(".info-actions").forEach(el => {
    el.style.display = "";
});
document.querySelectorAll(".tasbih-link").forEach(el => {
    el.style.display = "";
});
document.querySelectorAll(".latin").forEach(el => {
    el.style.display = "none";
});

document.querySelectorAll(".translation").forEach(el => {
    el.style.display = "none";
});
element.classList.remove("pdf-export");

        overlay.classList.remove("show");

        setTimeout(() => {
            overlay.style.display = "none";
        }, 300);

    }

}
