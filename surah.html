<!DOCTYPE html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/surahlist.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/list.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
  </head>
 
<body>
<!-- ============================================
     1. FIXED HEADER (STICKY TOP)
     ============================================ -->
<div class="top-header">

    <!-- Tombol Back -->
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>

    <!-- Judul -->
    <div class="header-title" id="headerTitle">
        Surah
    </div>

<!-- Tombol Daftar Doa -->
<div class="header-actions">

    <button id="listBtn" class="drawer-btn">
        <i class="fa-solid fa-list"></i>
    </button>

    <button id="playBtn" class="drawer-btn" title="Putar Audio Surah">
        <i class="fa-solid fa-circle-play"></i>
    </button>

    <button id="drawerBtn" class="drawer-btn">
        <i class="fa-solid fa-sliders"></i>
    </button>

</div>
  <!-- Drawer -->
    <div id="headerDrawer" class="header-drawer">

        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
          
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <button id="themeToggle" class="theme-toggle">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>

        <button id="fontSizeBtn" class="control-btn">
            <i class="fa-solid fa-maximize"></i>
        </button>

        <button id="wakeLockBtn" class="control-btn">
            <i class="fa-solid fa-mobile-screen-button"></i>
        </button>

    </div>

</div>
  
<div id="doaListDrawer" class="doa-list-drawer"></div>
  
<div id="fontSliderBox" class="font-slider-box">
    <input
        id="fontSlider"
        type="range"
        min="1.2"
        max="3"
        step="0.1"
        value="1.4">

    <span id="fontValue">1.4</span>
</div>
<!-- ============================================
     2. MAIN CONTAINER
     ============================================ -->
<div class="container">
    
    <header>
    <span class="arabic bismillah">
        بِــــــــسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ
    </span>
</header>
    
    <div class="dzikir-content" id="dzikir-content"></div>


    <!-- ============================================
         4. FOOTER
         ============================================ -->
    <footer>
    <p><strong>﴾ فَاذْكُرُونِي أَذْكُرْكُمْ ﴿</strong></p>
    <p>"Maka ingatlah kepada-Ku, niscaya Aku ingat kepadamu."</p>
    <small>QS. Al-Baqarah: 152</small>
    <br><br>
    <small>&copy; 2026 Juz Amma • Al-Quran Juz Ke-30 </small><br>
      <small>
Referensi materi:
Aplikasi Quran Kementrian Agama Republik Indonesia
</small>
</footer>
</div>
<script src="js/header.js"></script>  
<script>
async function loadSurah() {

    const surahId = new URLSearchParams(window.location.search).get("id");
    if (!surahId) return;

    const container = document.getElementById("dzikir-content");
    const listDrawer = document.getElementById("doaListDrawer");

    try {

        container.innerHTML = "";
        listDrawer.innerHTML = `
            <div class="doa-list-header">
                Daftar Ayat
            </div>
        `;

        const response = await fetch(`juzAmma/${surahId}.json`, {
            cache: "no-store"
        });

        if (!response.ok) throw new Error("Gagal memuat file.");

        const fullData = await response.json();
        const surah = fullData[surahId];

        document.getElementById("headerTitle").textContent =
            `Surah ${surah.name_latin}`;

        const ayahKeys = Object.keys(surah.text)
            .sort((a, b) => Number(a) - Number(b));

        ayahKeys.forEach(no => {

            const trans =
                surah.translations?.id?.text?.[no] ??
                "Terjemahan tidak tersedia";

            const tafsir =
                surah.tafsir?.id?.kemenag?.text?.[no] ??
                "Tafsir tidak tersedia";

            const card = document.createElement("div");
            card.className = "dzikir-card";
            card.id = `ayat-${no}`;

            card.innerHTML = `
                <div class="card-header">
                    <span class="title1">Ayat ${no}</span>
                </div>

                <span class="arabic">
                    ${surah.text[no]}
                </span>

                <span class="translation">
                    ${trans}
                </span>

                <details>
                    <summary>Tampilkan Tafsir</summary>
                    <span class="translation">
                        ${tafsir}
                    </span>
                </details>
            `;

            container.appendChild(card);

            listDrawer.insertAdjacentHTML(
                "beforeend",
                `
                <div class="doa-list-item"
                     data-target="ayat-${no}">
                    ${surah.name_latin} - Ayat ${no}
                </div>
                `
            );
        });

    } catch (err) {
        console.error(err);

        container.innerHTML = `
            <div class="dzikir-card">
                Gagal memuat surah.
            </div>
        `;
    }
}

// Jalankan langsung saat halaman selesai dimuat
document.addEventListener("DOMContentLoaded", () => {
    loadSurah();

    document.getElementById("playBtn").addEventListener("click", () => {
        const surahId = new URLSearchParams(window.location.search).get("id");
        window.location.href = `juz-amma-audio.html?id=${surahId}`;
    });
});
</script>

</body>
</html>
