<!DOCTYPE html>
<html lang="id" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/tasbih.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
  </head>
 <style>
   .list-container {
    max-width: 370px;
    margin: 60px auto;
    padding: 0 10px;
}

.item-card {
    background: var(--card);
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
    color: var(--text);
    transition: 0.3s;
}

.item-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.icon-box {
    width: 40px;
    height: 40px;
    background: var(--icon-bg);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: var(--icon-color);
}

[data-theme="dark"] .icon-box {
    background: var(--icon-bg);
    color: var(--icon-color);
}
</style>
<body>

<div class="top-header">

    <!-- Tombol Back -->
    <div class="back-container" onclick="goBack()">
        <div class="back-button"></div>
    </div>

    <!-- Judul -->
    <div class="header-title" id="headerTitle">
        Tasbih Dzikir
    </div>
    
    <!-- Tombol Drawer -->
    <button id="drawerBtn" class="header-icon-btn drawer-btn">
        <i class="fa-solid fa-sliders"></i>
    </button>

    <!-- Drawer -->
    <div id="headerDrawer" class="header-drawer">

        <div class="search-box">
            <input type="text" placeholder="Cari doa atau dzikir">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>

        <button id="themeToggle" class="theme-toggle">
            <i class="fa-solid fa-sun toggle-icon"></i>
        </button>

        <button id="fontSizeBtn" class="control-btn">
            <i class="fa-solid fa-maximize"></i>
        </button>

        <button id="wakeLockBtn" class="control-btn">
            <i class="fa-solid fa-mobile-screen-button"></i>
        </button>

    </div>

</div>
<div id="activeDzikirBox" class="active-dzikir-box">
    <div id="activeTargetText" class="active-target-text"></div>
    <div id="activeArabic" class="active-arabic"></div>
</div>
<div id="fontSliderBox" class="font-slider-box">
    <input
        id="fontSlider"
        type="range"
        min="1.2"
        max="3"
        step="0.1"
        value="1.4">

    <span id="fontValue">1.4</span>
</div>


<div class="list-container">

    <a href="tasbih-detail.html?id=subhanallah" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Subhanallah</strong></div>
    </a>

    <a href="tasbih-detail.html?id=alhamdulillah" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Alhamdulillah</strong></div>
    </a>

    <a href="tasbih-detail.html?id=lailahaillallah" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Laa Ilaaha Illallah</strong></div>
    </a>

    <a href="tasbih-detail.html?id=allahuakbar" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Allahu Akbar</strong></div>
    </a>

    <a href="tasbih-detail.html?id=istighfar" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Istighfar</strong></div>
    </a>

    <a href="tasbih-detail.html?id=shalawat" class="item-card">
        <div class="icon-box">
            <i class="fa-solid fa-star"></i>
        </div>
        <div><strong>Shalawat</strong></div>
    </a>

</div>
<script src="js/header.js"></script>
</body>
</html>
